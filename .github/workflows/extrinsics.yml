name: runtime_extrinsics

on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  run_extrinsics:
    name: Extrinsics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install Node Dependencies
        uses: actions/setup-node@v3
        with:
          node-version: 14
      - run: npm install --ignore-scripts -g @polkadot/metadata-cmp

      - name: Set-Up
        run: |
          sudo apt-get update
          sudo apt install -y cmake pkg-config libssl-dev git build-essential clang libclang-dev curl

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly-2022-03-21
          target: wasm32-unknown-unknown
          profile: minimal
          override: true
      - uses: Swatinem/rust-cache@v1

      - name: Build Release
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release

      - name: Run Extrinsice Ordering
        shell: bash
        continue-on-error: true
        run: |
          ./scripts/extrinsic_ordering.sh

  check_runtime:
    name: Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 100

      - name: Runtime and WASM check
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          # MAIN_BRANCH: ${{ github.base_ref }} #PR target branch
        run: |
          ./scripts/check_runtime.sh